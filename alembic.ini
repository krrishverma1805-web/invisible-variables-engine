# Alembic configuration for Invisible Variables Engine
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
timezone = UTC

# Max length of migration slug
truncate_slug_length = 40

version_locations = %(here)s/alembic/versions

version_path_separator = os

# Sync database URL for Alembic CLI.
# In Docker / CI, override via DATABASE_URL env var (env.py rewrites asyncpg → psycopg2).
sqlalchemy.url = postgresql+psycopg2://ive:ivepassword@localhost:5432/ive_db


[post_write_hooks]
# Auto-format generated migration files with ruff (if available)
# hooks = ruff_fix, ruff_format

# hooks.ruff_fix.type = exec
# hooks.ruff_fix.executable = ruff
# hooks.ruff_fix.options = check --fix REVISION_SCRIPT_FILENAME

# hooks.ruff_format.type = exec
# hooks.ruff_format.executable = ruff
# hooks.ruff_format.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
